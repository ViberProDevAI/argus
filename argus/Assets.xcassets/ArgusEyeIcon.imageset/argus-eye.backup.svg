<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="argus-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="argus-iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="70%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
  </defs>
  <!-- dış yankı halkaları -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.25"/>
  <circle cx="64" cy="64" r="52" fill="none" stroke="#60a5fa" stroke-width="0.6" stroke-opacity="0.45"/>
  <circle cx="64" cy="64" r="42" fill="none" stroke="#93c5fd" stroke-width="0.45" stroke-opacity="0.3" stroke-dasharray="2 3"/>
  <g filter="url(#argus-glow)">
    <!-- göz badem kabuk -->
    <path d="M14 64 Q64 24 114 64 Q64 104 14 64 Z" fill="none" stroke="#bfdbfe" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- iris -->
    <circle cx="64" cy="64" r="22" fill="url(#argus-iris)" fill-opacity="0.35" stroke="#93c5fd" stroke-width="1.2"/>
    <!-- iris iç halka -->
    <circle cx="64" cy="64" r="14" fill="none" stroke="#e0f2fe" stroke-width="0.7"/>
    <!-- pupil -->
    <circle cx="64" cy="64" r="5.5" fill="#0b1426" stroke="#bfdbfe" stroke-width="0.8"/>
    <!-- spark -->
    <circle cx="61" cy="61" r="1.4" fill="#e0f2fe"/>
  </g>
  <!-- kirpik (üst) -->
  <g stroke="#bfdbfe" stroke-width="0.8" stroke-linecap="round" opacity="0.75">
    <line x1="28" y1="44" x2="24" y2="38"/>
    <line x1="44" y1="34" x2="42" y2="26"/>
    <line x1="64" y1="30" x2="64" y2="22"/>
    <line x1="84" y1="34" x2="86" y2="26"/>
    <line x1="100" y1="44" x2="104" y2="38"/>
  </g>
  <!-- kirpik (alt) -->
  <g stroke="#bfdbfe" stroke-width="0.7" stroke-linecap="round" opacity="0.55">
    <line x1="28" y1="84" x2="24" y2="90"/>
    <line x1="64" y1="98" x2="64" y2="106"/>
    <line x1="100" y1="84" x2="104" y2="90"/>
  </g>
</svg>
